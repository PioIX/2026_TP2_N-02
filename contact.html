<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
</head>
<body>
    <header>
        <h1>Contacto</h1>
    </header>
    <main>
            <section id="contacto" class="section-contacto">
      <div class="section-header">
        <h2>Contacto</h2>
        <p class="section-subtitle">¿Interesado? Escribinos y te respondemos a la brevedad</p>
      </div>

      <div class="contacto-wrapper">

        <div class="contacto-info">
          <h3>JB Ranch — Ganadería</h3>
          <p>📍 Ruta 6, KM 88,Cañuelas</p>
          <p>📞 </p>
          <p>📱 </p>
          <p>✉️ </p>
          <p>🕐 </p>
        </div>

        <form class="form-contacto">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre"  placeholder="Ej: Juan García" required>

          <label for="direccion">Dirección</label>
          <input type="text" id="direccion"  placeholder="Ej: Bonifacio 11" required>

          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="correo@ejemplo.com" required>
          
          <label for="telefono">Numero de telefono</label>
          <input type="number" id="telefono" placeholder="Ej: 11-0607-6776" required>

          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje"  rows="5" placeholder="Escribí tu consulta sobre los animales disponibles..." required></textarea>

          <button type="submit" class="btn-submit">Enviar Consulta</button>
        </form>

      </div>
    </section>
    </main>
    <footer>

    </footer>
</body>
</html>
